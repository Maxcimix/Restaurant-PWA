version: '3.9'

services:

  # ── Base de datos PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       restaurant_pwa
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: Tdea2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      
      - ./backend/database/004_inventory.sql:/docker-entrypoint-initdb.d/03_inventory.sql
      - ./backend/database/005_shift_f10.sql:/docker-entrypoint-initdb.d/04_shift.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_pwa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Node.js ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant_backend
    restart: unless-stopped
    environment:
    
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_NAME:        restaurant_pwa
      DB_USER:        postgres
      DB_PASSWORD:    Tdea2024
      PORT:           3001
      NODE_ENV:       production
      JWT_SECRET:     cambiar-por-una-clave-segura-en-produccion
      JWT_EXPIRY:     24h
      CORS_ORIGIN: http://localhost
      OPERATION_MODE: ambos
      CLOUDINARY_CLOUD_NAME: dyzmbsh3k
      CLOUDINARY_API_KEY: "789198526526413"
      CLOUDINARY_API_SECRET: "-RRZD8-k87KfeTQwoxEPv9Mm2w0"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend React + Nginx ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurant_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
